<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground shadow -->
  <ellipse cx="50" cy="116" rx="28" ry="6" fill="rgba(0,0,0,0.35)"/>

  <!-- Dark aura glow -->
  <ellipse cx="50" cy="88" rx="34" ry="22" fill="rgba(180,0,30,0.12)"/>

  <!-- Roblox-block body (dark) -->
  <rect x="27" y="82" width="46" height="28" rx="9" fill="#150510" stroke="#300020" stroke-width="2.5"/>
  <rect x="31" y="86" width="38" height="8" rx="4" fill="rgba(200,0,40,0.18)"/>

  <!-- Block arms -->
  <rect x="10" y="83" width="20" height="16" rx="7" fill="#1A0D1A" stroke="#300020" stroke-width="2.2"/>
  <rect x="70" y="83" width="20" height="16" rx="7" fill="#1A0D1A" stroke="#300020" stroke-width="2.2"/>

  <!-- Claws -->
  <ellipse cx="19" cy="100" rx="11" ry="7.5" fill="#0D0010" stroke="#300020" stroke-width="1.5"/>
  <ellipse cx="81" cy="100" rx="11" ry="7.5" fill="#0D0010" stroke="#300020" stroke-width="1.5"/>
  <!-- Claw tips -->
  <path d="M 13 101 L 11 107 M 17 103 L 16 109 M 22 103 L 22 109" stroke="#CC0030" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 75 101 L 73 107 M 79 103 L 79 109 M 84 103 L 85 109" stroke="#CC0030" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wolf ears (pointed triangles, Roblox-blocky) -->
  <polygon points="16,44 20,10 40,38" fill="#1A0D1A" stroke="#300020" stroke-width="2.5"/>
  <polygon points="84,44 80,10 60,38" fill="#1A0D1A" stroke="#300020" stroke-width="2.5"/>
  <!-- Inner ear -->
  <polygon points="20,40 23,16 36,36" fill="#2D1525"/>
  <polygon points="80,40 77,16 64,36" fill="#2D1525"/>

  <!-- Head (slightly squarer than Karu - more menacing) -->
  <circle cx="50" cy="57" r="39" fill="#1A0D1A" stroke="#300020" stroke-width="3"/>
  <!-- Head texture overlay -->
  <ellipse cx="50" cy="57" rx="39" ry="39" fill="url(#darkGrain)" opacity="0.3"/>

  <!-- Muzzle (lighter area) -->
  <ellipse cx="50" cy="70" rx="20" ry="16" fill="#251525"/>

  <!-- Battle scar -->
  <path d="M 38 40 L 43 56" stroke="#CC0030" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M 39 40 L 44 56" stroke="#FF4060" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Red eye glow (outer) -->
  <ellipse cx="35" cy="52" rx="17" ry="15" fill="#CC0010" opacity="0.2"/>
  <ellipse cx="65" cy="52" rx="17" ry="15" fill="#CC0010" opacity="0.2"/>

  <!-- Eye whites (tinted red) -->
  <ellipse cx="35" cy="53" rx="13" ry="12" fill="#3A0008"/>
  <ellipse cx="65" cy="53" rx="13" ry="12" fill="#3A0008"/>

  <!-- Iris (glowing crimson) -->
  <circle cx="36" cy="53" r="9"   fill="#CC0020"/>
  <circle cx="66" cy="53" r="9"   fill="#CC0020"/>
  <!-- Iris inner glow -->
  <circle cx="36" cy="53" r="6"   fill="#FF1030"/>
  <circle cx="66" cy="53" r="6"   fill="#FF1030"/>

  <!-- Narrow slit pupils (wolf/menacing) -->
  <ellipse cx="36.5" cy="54" rx="3" ry="6" fill="#050000"/>
  <ellipse cx="66.5" cy="54" rx="3" ry="6" fill="#050000"/>

  <!-- Eye highlights (cold, sinister) -->
  <circle cx="40" cy="48" r="3"   fill="rgba(255,255,255,0.55)"/>
  <circle cx="70" cy="48" r="3"   fill="rgba(255,255,255,0.55)"/>
  <circle cx="33" cy="57" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="63" cy="57" r="1.5" fill="rgba(255,255,255,0.35)"/>

  <!-- Nose -->
  <ellipse cx="50" cy="67" rx="5.5" ry="4" fill="#0D0010" stroke="#300020" stroke-width="1"/>

  <!-- Smirk (asymmetric) -->
  <path d="M 43 74 Q 55 79 62 73" stroke="#300020" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Dark aura particles (MapleStory dark magic) -->
  <circle cx="16" cy="50" r="3.5" fill="#AA0020" opacity="0.5"/>
  <circle cx="84" cy="45" r="3"   fill="#CC0040" opacity="0.45"/>
  <circle cx="12" cy="72" r="2.5" fill="#880030" opacity="0.35"/>
  <circle cx="88" cy="68" r="2"   fill="#AA0040" opacity="0.4"/>
  <circle cx="20" cy="30" r="2"   fill="#CC0020" opacity="0.3"/>
  <circle cx="82" cy="28" r="2.5" fill="#AA0030" opacity="0.35"/>

  <!-- RIVAL text badge -->
  <rect x="28" y="5" width="44" height="14" rx="4" fill="#CC0020" stroke="#FF1030" stroke-width="1"/>
  <text x="50" y="15" font-size="9" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">⚔ RIVAL</text>
</svg>
