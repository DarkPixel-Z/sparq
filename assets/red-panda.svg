<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="60" cy="114" rx="26" ry="6" fill="rgba(0,0,0,0.18)"/>

  <!-- Ears -->
  <ellipse cx="28" cy="30" rx="15" ry="17" fill="#C84A14"/>
  <ellipse cx="92" cy="30" rx="15" ry="17" fill="#C84A14"/>
  <ellipse cx="28" cy="32" rx="8.5" ry="10" fill="#F8C8A8"/>
  <ellipse cx="92" cy="32" rx="8.5" ry="10" fill="#F8C8A8"/>

  <!-- Head -->
  <circle cx="60" cy="60" r="36" fill="#C84A14"/>

  <!-- White cheek patches -->
  <ellipse cx="38" cy="66" rx="15" ry="13" fill="#F2E0C0"/>
  <ellipse cx="82" cy="66" rx="15" ry="13" fill="#F2E0C0"/>

  <!-- Dark eye mask patches (signature red panda marking) -->
  <ellipse cx="40" cy="53" rx="14" ry="12" fill="#1C0A00"/>
  <ellipse cx="80" cy="53" rx="14" ry="12" fill="#1C0A00"/>

  <!-- Eye whites -->
  <ellipse cx="40" cy="54" rx="10.5" ry="9.5" fill="#FAFAFA"/>
  <ellipse cx="80" cy="54" rx="10.5" ry="9.5" fill="#FAFAFA"/>

  <!-- Iris (warm brown) -->
  <circle cx="41" cy="54" r="7.5" fill="#5A2E10"/>
  <circle cx="81" cy="54" r="7.5" fill="#5A2E10"/>

  <!-- Pupils -->
  <circle cx="41" cy="55" r="5" fill="#0C0400"/>
  <circle cx="81" cy="55" r="5" fill="#0C0400"/>

  <!-- Anime eye highlights (large + small) -->
  <circle cx="44.5" cy="51" r="3" fill="white"/>
  <circle cx="84.5" cy="51" r="3" fill="white"/>
  <circle cx="39" cy="57.5" r="1.4" fill="white" opacity="0.75"/>
  <circle cx="79" cy="57.5" r="1.4" fill="white" opacity="0.75"/>

  <!-- Nose -->
  <ellipse cx="60" cy="67" rx="5" ry="3.5" fill="#1C0A00"/>

  <!-- Cute smile -->
  <path d="M 53 73 Q 60 79 67 73" stroke="#1C0A00" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Rosy anime blush -->
  <ellipse cx="28" cy="68" rx="9" ry="5.5" fill="#FF8090" opacity="0.38"/>
  <ellipse cx="92" cy="68" rx="9" ry="5.5" fill="#FF8090" opacity="0.38"/>

  <!-- Forehead dark stripe (red panda marking) -->
  <path d="M 44 30 Q 60 22 76 30" stroke="#1C0A00" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Anime sparkle top-right -->
  <path d="M 107 32 L 109 26 L 111 32 L 109 38 Z" fill="#FFD700" opacity="0.9"/>
  <line x1="104" y1="32" x2="114" y2="32" stroke="#FFD700" stroke-width="1.5" opacity="0.9"/>
  <!-- Anime sparkle top-left -->
  <path d="M 13 38 L 15 33 L 17 38 L 15 43 Z" fill="#FF9BC5" opacity="0.8"/>
  <line x1="10" y1="38" x2="20" y2="38" stroke="#FF9BC5" stroke-width="1.2" opacity="0.8"/>

  <!-- Small floating stars (MapleStory feel) -->
  <text x="99" y="58" font-size="8" fill="#FFD700" opacity="0.7">✦</text>
  <text x="8" y="55" font-size="7" fill="#A87EFF" opacity="0.7">✦</text>
</svg>
