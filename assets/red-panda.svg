<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground shadow -->
  <ellipse cx="50" cy="116" rx="28" ry="6" fill="rgba(0,0,0,0.22)"/>

  <!-- Roblox-block body -->
  <rect x="27" y="82" width="46" height="28" rx="9" fill="#A83410" stroke="#1A0500" stroke-width="2.5"/>
  <rect x="31" y="86" width="38" height="8" rx="4" fill="rgba(255,140,60,0.28)"/>

  <!-- Block arms -->
  <rect x="10" y="83" width="20" height="16" rx="7" fill="#C84A14" stroke="#1A0500" stroke-width="2.2"/>
  <rect x="70" y="83" width="20" height="16" rx="7" fill="#C84A14" stroke="#1A0500" stroke-width="2.2"/>

  <!-- Dark paws -->
  <ellipse cx="19" cy="100" rx="11" ry="7.5" fill="#1A0800" stroke="#0A0200" stroke-width="1.5"/>
  <ellipse cx="81" cy="100" rx="11" ry="7.5" fill="#1A0800" stroke="#0A0200" stroke-width="1.5"/>

  <!-- Ears (blocky squares - MapleStory/Roblox hybrid) -->
  <rect x="10" y="14" width="26" height="28" rx="9" fill="#C84A14" stroke="#1A0500" stroke-width="2.5"/>
  <rect x="64" y="14" width="26" height="28" rx="9" fill="#C84A14" stroke="#1A0500" stroke-width="2.5"/>
  <!-- Inner ear -->
  <rect x="15" y="18" width="16" height="19" rx="5" fill="#F8C0A0"/>
  <rect x="69" y="18" width="16" height="19" rx="5" fill="#F8C0A0"/>

  <!-- BIG head (MapleStory chibi dominance) -->
  <circle cx="50" cy="57" r="40" fill="#C84A14" stroke="#1A0500" stroke-width="3"/>
  <!-- Head shine highlight -->
  <ellipse cx="34" cy="38" rx="15" ry="10" fill="rgba(255,190,110,0.22)" transform="rotate(-25 34 38)"/>

  <!-- White cheek patches -->
  <ellipse cx="21" cy="65" rx="15" ry="13" fill="#F2DEB8" stroke="#1A0500" stroke-width="1.8"/>
  <ellipse cx="79" cy="65" rx="15" ry="13" fill="#F2DEB8" stroke="#1A0500" stroke-width="1.8"/>

  <!-- Dark eye mask (red panda signature) -->
  <ellipse cx="35" cy="53" rx="16" ry="14" fill="#1A0800"/>
  <ellipse cx="65" cy="53" rx="16" ry="14" fill="#1A0800"/>

  <!-- Eye whites (MapleStory HUGE eyes) -->
  <ellipse cx="35" cy="54" rx="13" ry="12" fill="white"/>
  <ellipse cx="65" cy="54" rx="13" ry="12" fill="white"/>

  <!-- Iris -->
  <circle cx="36" cy="54" r="9" fill="#6B2E0A"/>
  <!-- Iris inner ring -->
  <circle cx="36" cy="54" r="6.5" fill="#2E0E00"/>
  <circle cx="66" cy="54" r="9" fill="#6B2E0A"/>
  <circle cx="66" cy="54" r="6.5" fill="#2E0E00"/>

  <!-- Pupils -->
  <circle cx="36.5" cy="55" r="4.5" fill="#050100"/>
  <circle cx="66.5" cy="55" r="4.5" fill="#050100"/>

  <!-- Big anime highlight (MapleStory iconic sparkle) -->
  <circle cx="41"  cy="49" r="4"   fill="white"/>
  <circle cx="71"  cy="49" r="4"   fill="white"/>
  <!-- Secondary highlight -->
  <circle cx="33"  cy="59" r="2"   fill="white" opacity="0.7"/>
  <circle cx="63"  cy="59" r="2"   fill="white" opacity="0.7"/>
  <!-- Sparkle dot -->
  <circle cx="43.5" cy="51.5" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="73.5" cy="51.5" r="1.5" fill="white" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="50" cy="66" rx="6" ry="4.5" fill="#1A0800" stroke="#0A0200" stroke-width="1.2"/>
  <!-- Mouth -->
  <path d="M 42 73 Q 50 80 58 73" stroke="#1A0800" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Rosy cheeks (big MapleStory blush) -->
  <ellipse cx="21" cy="68" rx="10" ry="6.5" fill="#FF6080" opacity="0.4"/>
  <ellipse cx="79" cy="68" rx="10" ry="6.5" fill="#FF6080" opacity="0.4"/>

  <!-- Forehead marking -->
  <path d="M 39 26 Q 50 17 61 26" stroke="#1A0800" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- MapleStory floating sparkles -->
  <text x="84" y="30" font-size="11" fill="#FFD700" opacity="0.9">✦</text>
  <text x="3"  y="46" font-size="10" fill="#FF9BC5" opacity="0.85">✦</text>
  <text x="87" y="75" font-size="8"  fill="#A87EFF" opacity="0.75">★</text>
  <text x="2"  y="76" font-size="7"  fill="#00FFD4" opacity="0.7">✦</text>
</svg>
